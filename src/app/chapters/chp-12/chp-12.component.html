<h1>Event in Angular</h1>

<button class="btn" name="btn" (click)="handleEvent($event)">Click Event</button>

<br><br>

<div
style="background-color: orange; width: 100px; height: 100px;"
(mouseenter)="handleEvent($event)"></div>

<br><br>

<div
style="background-color: skyblue; width: 100px; height: 100px;"
(mouseleave)="handleEvent($event)"></div>

<br><br>

<input 
type="text" 
name="" id=""
(input)="handleEvent($event)"
(focus)="handleEvent($event)"
(blur)="handleEvent($event)">
