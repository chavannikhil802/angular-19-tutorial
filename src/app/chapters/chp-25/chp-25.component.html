<h1>To-Do List</h1>
<hr>
<input type="text" [(ngModel)] = "task" placeholder="Enter your Task">&nbsp;
<button (click)="addTask()">Add Task</button>
<hr>
<h2>Task List</h2>
@for(task of taskList; track task.id) {
    <p>
        {{ task.id }} - {{ task.task }} | <button (click)="deleteTask(task.id)">Delete</button>
    </p>
}
